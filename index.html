<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<title>재미있는 그림들</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
}

body{
    border:10px solid red;
    background:linear-gradient(to bottom,#87CEFA,#FFFACD,#FFFFFF);
    font-family:"맑은 고딕";
    display:flex;
    flex-direction:column;
}

/* 제목 */
#title{
    height:15%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    font-weight:bold;
    color:#0055cc;
    text-shadow:3px 3px 6px gold;
    letter-spacing:5px;
}

/* 그림 */
#imageArea{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

#photo{
    width:520px;
    max-width:90%;
    border:8px solid royalblue;
    border-radius:25px;
    box-shadow:8px 8px 20px gray;
}

/* 버튼 */
#buttons{
    text-align:center;
    padding:15px;
}

button{

    width:180px;
    height:60px;

    margin:10px;
    border:none;
    border-radius:35px;

    background:linear-gradient(45deg,#4facfe,#00c6fb);

    color:white;

    font-size:24px;
    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    background:linear-gradient(45deg,#43e97b,#38f9d7);

    transform:scale(1.08);

    box-shadow:5px 5px 15px gray;
}

/* 이름 */
#footer{

    height:80px;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:50px;

    color:purple;

    font-weight:bold;

    text-shadow:2px 2px 5px pink;

}

</style>

<script>

function changeImage(fileName){

document.getElementById("photo").src=
"https://raw.githubusercontent.com/c371717/ax1/main/"+fileName;

}

</script>

</head>

<body>

<div id="title">
🌸 재미있는 그림들 🌸
</div>

<div id="imageArea">

<img id="photo"
src="https://images.unsplash.com/photo-1490750967868-88aa4486c946?w=900"
alt="예쁜 꽃">

</div>

<div id="buttons">

<button onclick="changeImage('3.png')">
🌼 그림 1
</button>

<button onclick="changeImage('car.png')">
🚗 자동차
</button>

<button onclick="changeImage('cat.png')">
🐱 고양이
</button>

</div>

<div id="footer">
최 유 정
</div>

</body>
</html>
